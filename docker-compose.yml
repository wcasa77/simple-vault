services:
  vault:
    build: .
    container_name: simple-vault
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - vault-data:/data
    environment:
      - PORT=3100
      - ALLOWED_IPS=${ALLOWED_IPS:-}
      - VAULT_NAME=${VAULT_NAME:-Simple Vault}
      - VAULT_DESCRIPTION=${VAULT_DESCRIPTION:-}
      - VAULT_DOMAIN=${VAULT_DOMAIN:-}

  caddy:
    image: caddy:2-alpine
    container_name: vault-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - VAULT_DOMAIN=${VAULT_DOMAIN}
    depends_on:
      - vault

volumes:
  vault-data:
  caddy-data:
  caddy-config:
